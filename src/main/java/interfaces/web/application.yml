# WeChat Acquisition Platform Configuration
# 企业微信获客平台配置

server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: wechat-acquisition
  
  # MySQL 配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/wechat_acquisition?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: root
    password: ${MYSQL_PASSWORD:root}
  
  # MongoDB 配置 (对话记录)
  data:
    mongodb:
      uri: mongodb://localhost:27017/wechat_acquisition
  
  # Redis 配置
  redis:
    host: localhost
    port: 6379
    password: ${REDIS_PASSWORD:}
    database: 0
    lettuce:
      pool:
        max-active: 20
        max-idle: 10
        min-idle: 5

# MyBatis-Plus 配置
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.wechat.acquisition.domain
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# 企微配置
wechat:
  corp-id: ${WECHAT_CORP_ID:}
  agent-id: ${WECHAT_AGENT_ID:}
  secret: ${WECHAT_SECRET:}
  token: ${WECHAT_TOKEN:}
  encoding-aes-key: ${WECHAT_ENCODING_AES_KEY:}
  
  # 防封号策略
  rate-limit:
    daily-add-limit: 50
    hourly-add-limit: 10
    minute-add-limit: 2
    add-interval-min: 30
    add-interval-max: 120
    message-daily-limit: 200
    account-pool-size: 3
    enable-rotation: true

# 大模型配置 (通义千问)
llm:
  provider: dashscope
  dashscope:
    api-key: ${DASHSCOPE_API_KEY:}
    model: qwen-max
    max-tokens: 1000
    temperature: 0.7
  
  # 成本控制
  cost-control:
    daily-budget: 1000
    max-tokens-per-request: 2000
    batch-analysis: true

# RocketMQ 配置
rocketmq:
  name-server: ${ROCKETMQ_NAME_SERVER:localhost:9876}
  producer:
    group: wechat-acquisition-producer
    send-message-timeout: 3000

# XXL-Job 配置
xxl:
  job:
    admin:
      addresses: ${XXL_JOB_ADMIN:http://localhost:8080/xxl-job-admin}
    executor:
      appname: wechat-acquisition
      address:
      ip:
      port: 9999
      logpath: /data/applogs/xxl-job/jobhandler
      logretentiondays: 30
    access-token: ${XXL_JOB_ACCESS_TOKEN:}

# 日志配置
logging:
  level:
    root: INFO
    com.wechat.acquisition: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# Actuator 健康检查
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
