# Spec: Intent Scoring Capability
# 意向打分能力规格说明

capability:
  name: intent-scoring
  version: 1.0.0
  description: 多维度线索评分引擎

scoring_model:
  # 打分维度和权重
  dimensions:
    - name: responsiveness
      label: 响应度
      weight: 0.30
      metrics:
        - name: reply_speed
          description: 平均回复时间 (秒)
          score_rule: "speed < 60 ? 100 : speed < 300 ? 80 : speed < 600 ? 60 : 40"
        - name: reply_length
          description: 平均回复长度 (字)
          score_rule: "length > 50 ? 100 : length > 20 ? 80 : length > 10 ? 60 : 40"
        - name: initiative
          description: 主动提问次数
          score_rule: "count > 3 ? 100 : count > 1 ? 70 : 40"
    
    - name: interest
      label: 兴趣度
      weight: 0.35
      metrics:
        - name: product_keywords
          description: 产品关键词提及次数
          keywords: ["价格", "费用", "怎么用", "功能", "效果", "案例"]
          score_rule: "count > 5 ? 100 : count > 2 ? 80 : count > 0 ? 60 : 30"
        - name: price_inquiry
          description: 是否询问价格
          score_rule: "has_inquiry ? 100 : 50"
        - name: feature_detail
          description: 询问功能细节
          score_rule: "count > 3 ? 100 : count > 1 ? 70 : 40"
    
    - name: urgency
      label: 紧迫度
      weight: 0.20
      metrics:
        - name: time_expression
          description: 时间紧迫表达
          keywords: ["尽快", "马上", "本周", "下周", "急", "快"]
          score_rule: "has_expression ? 100 : 50"
        - name: decision_cycle
          description: 决策周期 (天)
          score_rule: "days < 7 ? 100 : days < 30 ? 70 : days < 90 ? 50 : 30"
    
    - name: match
      label: 匹配度
      weight: 0.15
      metrics:
        - name: profile_match
          description: 用户画像匹配度
          score_rule: "calculated_by_rule_engine"
        - name: behavior_match
          description: 行为数据匹配度
          score_rule: "calculated_by_rule_engine"

intent_levels:
  - level: A
    name: 高意向
    score_range: [80, 100]
    action: 立即人工跟进
    followup_sla: 1h
  
  - level: B
    name: 中意向
    score_range: [60, 79]
    action: 持续培育
    followup_sla: 24h
  
  - level: C
    name: 低意向
    score_range: [40, 59]
    action: 自动化触达
    followup_sla: 7d
  
  - level: D
    name: 无意向
    score_range: [0, 39]
    action: 归档/移除
    followup_sla: null

interfaces:
  # 实时打分
  real_time_scoring:
    endpoint: POST /api/v1/scoring/score
    request:
      content_type: application/json
      body:
        conversation_id: string (required)
        messages: array[object] (required)
        contact_profile: object (optional)
    response:
      success:
        intent_score:
          total_score: number
          level: enum [A, B, C, D]
          dimensions: object
          reasoning: string
          scored_at: string
  
  # 批量打分
  batch_scoring:
    endpoint: POST /api/v1/scoring/batch
    request:
      content_type: application/json
      body:
        conversation_ids: array[string] (required, max: 1000)
    response:
      success:
        task_id: string
        total_count: integer
        status: enum [PENDING, PROCESSING, COMPLETED]
  
  # 自定义规则配置
  custom_rules:
    endpoint: PUT /api/v1/scoring/rules
    request:
      content_type: application/json
      body:
        dimension: string (required)
        metrics: array[object]
        weights: object

tag_mapping:
  # 意向等级到标签的映射
  A: ["高意向", "优先跟进", "hot_lead"]
  B: ["中意向", "持续培育", "warm_lead"]
  C: ["低意向", "自动化培育", "cold_lead"]
  D: ["无意向", "暂不跟进", "unqualified"]

error_codes:
  - code: SCORING_INVALID_CONVERSATION
    message: "对话数据不足，无法打分"
    http_status: 400
  
  - code: SCORING_MODEL_ERROR
    message: "打分模型异常"
    http_status: 500
