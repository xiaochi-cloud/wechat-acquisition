server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: wechat-acquisition
  
  # 数据库配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/wechat_acquisition?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: WeChat2026!Root
    # HikariCP 连接池配置
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      pool-name: WeChatHikariPool
  
  # MongoDB 配置 (对话记录)
  data:
    mongodb:
      uri: mongodb://localhost:27017/wechat_acquisition
  
  # Redis 配置
  redis:
    host: localhost
    port: 6379
    database: 0
    timeout: 5000ms
    lettuce:
      pool:
        max-active: 20
        max-idle: 10
        min-idle: 5
  
  # JPA 配置
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  
  # Jackson 配置
  jackson:
    time-zone: Asia/Shanghai
    date-format: yyyy-MM-dd HH:mm:ss

# MyBatis-Plus 配置
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.wechat.acquisition.domain
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# 企微配置
wechat:
  corp-id: ${WECHAT_CORP_ID:}
  agent-id: ${WECHAT_AGENT_ID:}
  secret: ${WECHAT_SECRET:}
  token: ${WECHAT_TOKEN:}
  encoding-aes-key: ${WECHAT_ENCODING_AES_KEY:}
  
  # 频率限制配置
  rate-limit:
    daily-add-limit: 50
    hourly-add-limit: 10
    minute-add-limit: 2
    add-interval-min: 30
    add-interval-max: 120

# 大模型配置
llm:
  provider: dashscope
  dashscope:
    api-key: ${DASHSCOPE_API_KEY:}
    model: qwen-max
    max-tokens: 1000
    temperature: 0.7

# 日志配置
logging:
  level:
    root: INFO
    com.wechat.acquisition: DEBUG
    org.springframework.web: INFO
    org.hibernate: ERROR
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: /tmp/wechat-acquisition.log
    max-size: 10MB
    max-history: 30

# Actuator 监控
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    export:
      prometheus:
        enabled: true
