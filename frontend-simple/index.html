<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>企业微信获客平台</title>
    <link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f0f2f5; }
        .header { background: #409EFF; color: white; padding: 20px; text-align: center; }
        .container { max-width: 1200px; margin: 20px auto; padding: 20px; }
        .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 20px; }
        .stat-card { background: white; padding: 20px; border-radius: 8px; text-align: center; }
        .stat-value { font-size: 32px; font-weight: bold; color: #409EFF; }
        .stat-label { color: #999; margin-top: 10px; }
        .content { background: white; padding: 20px; border-radius: 8px; }
    </style>
</head>
<body>
    <div class="header">
        <h1>🚀 企业微信获客平台</h1>
        <p>智能获客 · 高效转化</p>
    </div>
    <div class="container">
        <div class="stats">
            <div class="stat-card">
                <div class="stat-value">10,245</div>
                <div class="stat-label">总联系人</div>
            </div>
            <div class="stat-card">
                <div class="stat-value">3,856</div>
                <div class="stat-label">已添加好友</div>
            </div>
            <div class="stat-card">
                <div class="stat-value">2,104</div>
                <div class="stat-label">会话数</div>
            </div>
            <div class="stat-card">
                <div class="stat-value">428</div>
                <div class="stat-label">高意向用户</div>
            </div>
        </div>
        <div class="content">
            <h2>系统状态</h2>
            <p>✅ 应用服务运行中</p>
            <p>✅ 数据库连接正常</p>
            <p>✅ API 端点：25 个</p>
            <p>🔄 前端版本：1.0.0 (简化版)</p>
        </div>
    </div>
    <script src="https://unpkg.com/vue@3"></script>
    <script src="https://unpkg.com/element-plus"></script>
</body>
</html>
