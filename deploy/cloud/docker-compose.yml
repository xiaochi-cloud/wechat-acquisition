# 企业微信获客平台 - 生产环境 Docker Compose
# 服务器：47.97.3.29

version: '3.8'

services:
  # MySQL 数据库
  mysql:
    image: mysql:8.0
    container_name: wechat-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:WeChat2026!Root}
      MYSQL_DATABASE: wechat_acquisition
      MYSQL_USER: wechat
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:WeChat2026!Prod}
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - /data/wechat/mysql:/var/lib/mysql
      - ./scripts/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
      - ./scripts/mysql/my.cnf:/etc/mysql/conf.d/my.cnf
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+8:00
      - --max_connections=500
      - --innodb_buffer_pool_size=1G
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - wechat-network

  # MongoDB (对话记录)
  mongodb:
    image: mongo:7.0
    container_name: wechat-mongodb
    restart: always
    environment:
      MONGO_INITDB_DATABASE: wechat_acquisition
      TZ: Asia/Shanghai
    ports:
      - "27017:27017"
    volumes:
      - /data/wechat/mongodb:/data/db
      - /data/wechat/mongodb/log:/var/log/mongodb
    command:
      - --storageEngine=wiredTiger
      - --wiredTigerCacheSizeGB=2
    networks:
      - wechat-network

  # Redis (缓存和频率控制)
  redis:
    image: redis:7-alpine
    container_name: wechat-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - /data/wechat/redis:/data
      - ./scripts/redis/redis.conf:/usr/local/etc/redis/redis.conf
    command: redis-server /usr/local/etc/redis/redis.conf
    networks:
      - wechat-network

  # RocketMQ Namesrv
  rocketmq-namesrv:
    image: apache/rocketmq:5.1.0
    container_name: wechat-rocketmq-namesrv
    restart: always
    ports:
      - "9876:9876"
    volumes:
      - /data/wechat/rocketmq/namesrv:/home/rocketmq/namesrv
    environment:
      JAVA_OPT_EXT: "-Xms256m -Xmx256m"
    command: sh mqnamesrv
    networks:
      - wechat-network

  # RocketMQ Broker
  rocketmq-broker:
    image: apache/rocketmq:5.1.0
    container_name: wechat-rocketmq-broker
    restart: always
    ports:
      - "10911:10911"
      - "10909:10909"
    volumes:
      - /data/wechat/rocketmq/broker:/home/rocketmq/broker
      - ./scripts/rocketmq/broker.conf:/home/rocketmq/rocketmq-5.1.0/conf/broker.conf
    environment:
      NAMESRV_ADDR: rocketmq-namesrv:9876
      JAVA_OPT_EXT: "-Xms256m -Xmx256m"
    command: sh mqbroker -c /home/rocketmq/rocketmq-5.1.0/conf/broker.conf
    depends_on:
      - rocketmq-namesrv
    networks:
      - wechat-network

  # RocketMQ Console
  rocketmq-console:
    image: apache/rocketmq-dashboard:1.0.0
    container_name: wechat-rocketmq-console
    restart: always
    ports:
      - "8081:8080"
    environment:
      JAVA_OPTS: "-Drocketmq.namesrv.addr=rocketmq-namesrv:9876"
    depends_on:
      - rocketmq-namesrv
    networks:
      - wechat-network

  # XXL-Job (任务调度)
  xxl-job-admin:
    image: xuxueli/xxl-job-admin:2.4.0
    container_name: wechat-xxl-job
    restart: always
    ports:
      - "8082:8080"
    environment:
      PARAMS: "--spring.datasource.url=jdbc:mysql://mysql:3306/xxl_job?useUnicode=true&characterEncoding=UTF-8&autoReconnect=true&serverTimezone=Asia/Shanghai --spring.datasource.username=root --spring.datasource.password=${MYSQL_ROOT_PASSWORD:WeChat2026!Root}"
    depends_on:
      - mysql
    networks:
      - wechat-network

  # Nginx (反向代理 + 前端)
  nginx:
    image: nginx:alpine
    container_name: wechat-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./scripts/nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./scripts/nginx/conf.d:/etc/nginx/conf.d
      - /data/wechat/nginx/ssl:/etc/nginx/ssl
      - /data/wechat/nginx/html:/usr/share/nginx/html
    depends_on:
      - mysql
    networks:
      - wechat-network

networks:
  wechat-network:
    driver: bridge

volumes:
  mysql-data:
  mongodb-data:
  redis-data:
  rocketmq-data:
